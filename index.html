const ADJECTIVES = ['Oat','Clay','Moss','Stone','Walnut','Linen','Smoke','Sand','Rust','Ash'];

function seededRandom(seed) {
  let s = seed;
  return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
}

function buildProducts() {
  const products = []; let id = 1;
  Object.entries(PRODUCT_NAMES).forEach(([catId, names]) => {
    names.forEach((name) => {
      const rand = seededRandom(id * 7 + 13);
      const basePrice = Math.round((40 + rand() * 460) / 5) * 5;
      const hasDiscount = rand() > 0.65;
      const price = hasDiscount ? Math.round(basePrice * (0.7 + rand() * 0.15)) : basePrice;
      const rating = Math.round((3.2 + rand() * 1.8) * 10) / 10;
      const reviewCount = Math.floor(20 + rand() * 480);
      const inStock = rand() > 0.12;
      const isNew = rand() > 0.75;
      const daysAgo = Math.floor(rand() * 200);
      const colorPool = ADJECTIVES.slice(0, 3 + Math.floor(rand() * 3));
      const hasSizes = ['seating','textiles','tables'].includes(catId);
      const imgs = PRODUCT_IMAGES[id] || [
        `https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=600&q=80`,
        `https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=600&q=80`,
        `https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?w=600&q=80`,
      ];
      products.push({
        id, name, category: catId, price,
        originalPrice: hasDiscount ? basePrice : null,
        rating, reviewCount, inStock, isNew, addedDaysAgo: daysAgo,
        colors: colorPool, sizes: hasSizes ? ['S','M','L'] : null,
        description: `The ${name} brings a considered, tactile presence to any room. Crafted from sustainably sourced materials with close attention to grain, weight, and finish — designed to soften with use and age well over years, not seasons.`,
        details: ['Solid hardwood frame with hand-finished joinery','Removable, machine-washable covers where applicable','Ships flat-packed with tool-free assembly','1-year workmanship warranty'],
        images: imgs,
      });
      id++;
    });
  });
  return products;
}

function ProductImg({ src, alt, style = {}, className = '' }) {
  const [loaded, setLoaded] = useState(false);
  const [error, setError] = useState(false);
  return (
    <div style={{ position:'relative', width:'100%', height:'100%', background:'#EDE7DA', overflow:'hidden', ...style }}>
      {!loaded && !error && (
        <div style={{
          position:'absolute', inset:0,
          background:'linear-gradient(90deg,#EDE7DA 25%,#F5F0E6 50%,#EDE7DA 75%)',
          backgroundSize:'200% 100%', animation:'shimmer 1.5s infinite',
        }} />
      )}
      {!error ? (
        <img
          src={src}
          alt={alt}
          className={className}
          onLoad={() => setLoaded(true)}
          onError={() => setError(true)}
          style={{
            width:'100%', height:'100%', objectFit:'cover', display:'block',
            opacity: loaded ? 1 : 0, transition:'opacity 0.4s ease',
          }}
        />
      ) : (
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%', color:'#A39B8C', fontSize:13, fontFamily:'Inter,sans-serif' }}>
          No image
        </div>
      )}
    </div>
  );
}

const CartContext = createContext(null);
const useCart = () => useContext(CartContext);
const TAX_RATE = 0.08;
const FREE_SHIPPING_THRESHOLD = 200;
const SHIPPING_FLAT = 12;

function CartProvider({ children }) {
  const [items, setItems] = useState([]);
  const [toast, setToast] = useState(null);
  const [wishlist, setWishlist] = useState([]);

  const showToast = useCallback((message) => setToast({ message, id: Date.now() }), []);
  useEffect(() => { if (!toast) return; const t = setTimeout(() => setToast(null), 2400); return () => clearTimeout(t); }, [toast]);

  const addItem = useCallback((product, options = {}) => {
    const { color, size, quantity = 1 } = options;
    setItems(prev => {
      const lineId = `${product.id}-${color||'default'}-${size||'default'}`;
      const existing = prev.find(i => i.lineId === lineId);
      if (existing) return prev.map(i => i.lineId === lineId ? {...i, quantity: i.quantity + quantity} : i);
      return [...prev, { lineId, productId: product.id, name: product.name, price: product.price, category: product.category, color: color||null, size: size||null, quantity, image: product.images[0] }];
    });
    showToast(`Added ${product.name} to your cart`);
  }, [showToast]);

  const removeItem = useCallback((lineId) => setItems(prev => prev.filter(i => i.lineId !== lineId)), []);
  const updateQuantity = useCallback((lineId, quantity) => setItems(prev => quantity <= 0 ? prev.filter(i => i.lineId !== lineId) : prev.map(i => i.lineId === lineId ? {...i, quantity} : i)), []);
  const clearCart = useCallback(() => setItems([]), []);
  const toggleWishlist = useCallback((id) => setWishlist(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]), []);

  const subtotal = useMemo(() => items.reduce((s, i) => s + i.price * i.quantity, 0), [items]);
  const itemCount = useMemo(() => items.reduce((s, i) => s + i.quantity, 0), [items]);

  return (
    <CartContext.Provider value={{ items, addItem, removeItem, updateQuantity, clearCart, subtotal, itemCount, toast, showToast, wishlist, toggleWishlist }}>
      {children}
    </CartContext.Provider>
  );
}

  return <span style={{ display:'inline-flex', alignItems:'center', padding:'4px 9px', fontSize:11, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', borderRadius:4, background:t.bg, color:t.color, fontFamily:'Inter,sans-serif' }}>{children}</span>;
}

function Button({ children, variant = 'primary', size = 'md', onClick, disabled, style, type = 'button', full }) {
  const base = { fontFamily:'Inter,sans-serif', fontWeight:600, borderRadius:6, border:'1.5px solid transparent', cursor:disabled?'not-allowed':'pointer', transition:'all 0.18s ease', display:'inline-flex', alignItems:'center', justifyContent:'center', gap:8, opacity:disabled?0.5:1, width:full?'100%':'auto' };
  const sizes = { sm:{padding:'8px 14px',fontSize:13}, md:{padding:'12px 22px',fontSize:14.5}, lg:{padding:'15px 30px',fontSize:15.5} };
  const variants = { primary:{background:'#1C1B19',color:'#FAF7F2',borderColor:'#1C1B19'}, accent:{background:'#B5562C',color:'#FFF',borderColor:'#B5562C'}, secondary:{background:'transparent',color:'#1C1B19',borderColor:'#1C1B19'}, ghost:{background:'transparent',color:'#6B5D4F',borderColor:'transparent'}, light:{background:'#FFFFFF',color:'#1C1B19',borderColor:'#E4DCC9'} };
  return (
    <button type={type} onClick={disabled?undefined:onClick}
      onMouseEnter={e => { if(disabled) return; if(variant==='primary') e.currentTarget.style.background='#3D3936'; if(variant==='accent') e.currentTarget.style.background='#9A4A26'; if(variant==='secondary'){e.currentTarget.style.background='#1C1B19';e.currentTarget.style.color='#FAF7F2';} }}
      onMouseLeave={e => { if(disabled) return; if(variant==='primary') e.currentTarget.style.background=variants.primary.background; if(variant==='accent') e.currentTarget.style.background=variants.accent.background; if(variant==='secondary'){e.currentTarget.style.background='transparent';e.currentTarget.style.color='#1C1B19';} }}
      style={{ ...base, ...sizes[size], ...variants[variant], ...style }}
    >{children}</button>
  );
}

function Skeleton({ width='100%', height=16, radius=4, style }) {
  return <div style={{ width, height, borderRadius:radius, background:'linear-gradient(90deg,#EDE7DA 25%,#F5F0E6 50%,#EDE7DA 75%)', backgroundSize:'200% 100%', animation:'shimmer 1.5s infinite', ...style }} />;
}

function EmptyState({ icon: Icon, title, message, action }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'64px 24px', textAlign:'center', gap:14 }}>
      <div style={{ width:64, height:64, borderRadius:'50%', background:'#EDE7DA', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:6 }}>
        <Icon size={28} color="#A39B8C" />
      </div>
      <h3 style={{ fontFamily:'Fraunces,serif', fontSize:22, fontWeight:600, color:'#1C1B19', margin:0 }}>{title}</h3>
      <p style={{ fontFamily:'Inter,sans-serif', fontSize:14.5, color:'#8C8579', maxWidth:360, margin:0, lineHeight:1.6 }}>{message}</p>
      {action}
    </div>
  );
}

/* ============================================================
   PRODUCT CARD
   ============================================================ */
function ProductCard({ product, onNavigate }) {
  const { addItem, wishlist, toggleWishlist } = useCart();
  const [hovered, setHovered] = useState(false);
  const discount = product.originalPrice ? Math.round((1 - product.price / product.originalPrice) * 100) : null;
  const isWished = wishlist.includes(product.id);

  const handleAdd = (e) => { e.stopPropagation(); addItem(product, { color: product.colors?.[0], size: product.sizes?.[1]||null, quantity:1 }); };

  return (
    <div
      onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      onClick={() => onNavigate('product', product.id)}
      style={{ display:'flex', flexDirection:'column', cursor:'pointer', borderRadius:10, overflow:'hidden', background:'#FFFFFF', border:'1px solid #EFE9DD', transform:hovered?'translateY(-4px)':'translateY(0)', boxShadow:hovered?'0 12px 28px -8px rgba(28,27,25,0.16)':'0 1px 2px rgba(28,27,25,0.03)', transition:'transform 0.25s ease, box-shadow 0.25s ease', animation:'fadeIn 0.4s ease' }}
    >
      <div style={{ position:'relative', aspectRatio:'1/1', overflow:'hidden' }}>
        <ProductImg src={product.images[0]} alt={product.name} style={{ transform:hovered?'scale(1.06)':'scale(1)', transition:'transform 0.5s ease' }} />
        <div style={{ position:'absolute', top:10, left:10, display:'flex', gap:6, flexWrap:'wrap' }}>
          {product.isNew && <Badge tone="new">New</Badge>}
          {discount && <Badge tone="sale">-{discount}%</Badge>}
          {!product.inStock && <Badge tone="out">Sold out</Badge>}
        </div>
        <button
          onClick={e => { e.stopPropagation(); toggleWishlist(product.id); }}
          aria-label="Save to wishlist"
          style={{ position:'absolute', top:10, right:10, width:32, height:32, borderRadius:'50%', border:'none', background:'rgba(255,255,255,0.9)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', opacity:hovered||isWished?1:0, transition:'opacity 0.2s ease' }}
        >
          <svg width="15" height="15" viewBox="0 0 24 24" fill={isWished?'#B5562C':'none'} stroke={isWished?'#B5562C':'#1C1B19'} strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:10, transform:hovered?'translateY(0)':'translateY(110%)', transition:'transform 0.25s ease' }}>
          <Button variant="primary" size="sm" full disabled={!product.inStock} onClick={handleAdd}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            {product.inStock ? 'Add to cart' : 'Unavailable'}
          </Button>
        </div>
      </div>
      <div style={{ padding:'14px 14px 16px' }}>
        <div style={{ fontSize:11.5, color:'#A39B8C', fontFamily:'Inter,sans-serif', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:4 }}>
          {CATEGORIES.find(c => c.id === product.category)?.name}
        </div>
        <h3 style={{ fontFamily:'Fraunces,serif', fontSize:16.5, fontWeight:600, color:'#1C1B19', margin:'0 0 6px', lineHeight:1.3 }}>{product.name}</h3>
        <div style={{ marginBottom:8 }}><StarRating rating={product.rating} /></div>
        <Price price={product.price} originalPrice={product.originalPrice} />
      </div>
    </div>
  );
}

        </div>

    </>
  );

const SORT_OPTIONS = [{ id:'newest', label:'Newest' },{ id:'price-asc', label:'Price: low to high' },{ id:'price-desc', label:'Price: high to low' },{ id:'rating-desc', label:'Highest rated' }];

function FilterSection({ title, children, defaultOpen = true }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div style={{ borderBottom:'1px solid #EFE9DD', paddingBottom:18, marginBottom:18 }}>
      <button onClick={() => setOpen(v => !v)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', width:'100%', background:'none', border:'none', cursor:'pointer', padding:'0 0 12px', fontFamily:'Inter,sans-serif', fontSize:14, fontWeight:600, color:'#1C1B19' }}>
        {title}
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ transform:open?'rotate(180deg)':'rotate(0)', transition:'transform 0.2s ease' }}><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      {open && children}
    </div>
  );
}

function CheckboxRow({ label, checked, onChange, count }) {
  return (
    <label style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 0', cursor:'pointer', fontFamily:'Inter,sans-serif', fontSize:13.5 }}>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <div style={{ width:17, height:17, borderRadius:4, border:`1.5px solid ${checked?'#1C1B19':'#D9D2C4'}`, background:checked?'#1C1B19':'transparent', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.15s ease', flexShrink:0 }}>
          {checked && <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#FAF7F2" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
        </div>
        <span style={{ color:'#3D3936' }}>{label}</span>
      </div>
      {count !== undefined && <span style={{ color:'#A39B8C', fontSize:12 }}>{count}</span>}
      <input type="checkbox" checked={checked} onChange={onChange} style={{ display:'none' }} />
    </label>
  );
}

function FilterPanel({ filters, setFilters, productCounts, maxPrice }) {
  const toggleCategory = catId => setFilters(f => ({ ...f, categories: f.categories.includes(catId) ? f.categories.filter(c => c !== catId) : [...f.categories, catId] }));
  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
        <h3 style={{ fontFamily:'Fraunces,serif', fontSize:19, fontWeight:700, margin:0, color:'#1C1B19' }}>Filters</h3>
        <button onClick={() => setFilters({ categories:[], maxPrice, minRating:0, inStockOnly:false })} style={{ background:'none', border:'none', cursor:'pointer', fontFamily:'Inter,sans-serif', fontSize:12.5, color:'#B5562C', fontWeight:600 }}>Clear all</button>
      </div>
      <FilterSection title="Category">
        {CATEGORIES.map(cat => <CheckboxRow key={cat.id} label={cat.name} count={productCounts[cat.id]||0} checked={filters.categories.includes(cat.id)} onChange={() => toggleCategory(cat.id)} />)}
      </FilterSection>
      <FilterSection title="Price">
        <div style={{ padding:'4px 0' }}>
          <input type="range" min={0} max={maxPrice} step={5} value={filters.maxPrice} onChange={e => setFilters(f => ({...f, maxPrice: Number(e.target.value)}))} style={{ width:'100%' }} />
          <div style={{ display:'flex', justifyContent:'space-between', fontFamily:'Inter,sans-serif', fontSize:13, color:'#6B5D4F', marginTop:6 }}>
            <span>$0</span><span style={{ fontWeight:600, color:'#1C1B19' }}>Up to ${filters.maxPrice}</span>
          </div>
        </div>
      </FilterSection>
      <FilterSection title="Rating">
        {[4,3,2].map(r => (
          <label key={r} onClick={() => setFilters(f => ({...f, minRating: f.minRating===r?0:r}))} style={{ display:'flex', alignItems:'center', gap:10, padding:'6px 0', cursor:'pointer' }}>
            <div style={{ width:17, height:17, borderRadius:'50%', border:`1.5px solid ${filters.minRating===r?'#1C1B19':'#D9D2C4'}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              {filters.minRating===r && <div style={{ width:9, height:9, borderRadius:'50%', background:'#1C1B19' }} />}
            </div>
            <StarRating rating={r} showNumber={false} size={13} />
            <span style={{ fontFamily:'Inter,sans-serif', fontSize:13, color:'#6B5D4F' }}>& up</span>
          </label>
        ))}
      </FilterSection>
      <FilterSection title="Availability">
        <CheckboxRow label="In stock only" checked={filters.inStockOnly} onChange={() => setFilters(f => ({...f, inStockOnly:!f.inStockOnly}))} />
      </FilterSection>
    </div>
  );
}

function FilterChip({ label, onRemove }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:6, background:'#EDE7DA', borderRadius:20, padding:'6px 8px 6px 12px', fontFamily:'Inter,sans-serif', fontSize:12.5, fontWeight:500, color:'#3D3936' }}>
      {label}
      <button onClick={onRemove} style={{ background:'#D9D2C4', border:'none', borderRadius:'50%', width:18, height:18, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#3D3936" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  );
}

function ProductsPage({ onNavigate, searchQuery, setSearchQuery, selectedCategory, setSelectedCategory }) {
  const maxPrice = useMemo(() => Math.max(...PRODUCTS.map(p => p.price)), []);
  const [filters, setFilters] = useState({ categories: selectedCategory?[selectedCategory]:[], maxPrice, minRating:0, inStockOnly:false });
  const [sortBy, setSortBy] = useState('newest');
  const [loading, setLoading] = useState(true);
  const [mobileFiltersOpen, setMobileFiltersOpen] = useState(false);

  useEffect(() => { if(selectedCategory){setFilters(f=>({...f,categories:[selectedCategory]}));setSelectedCategory(null);} }, [selectedCategory]);
  useEffect(() => { setLoading(true); const t = setTimeout(() => setLoading(false), 550); return () => clearTimeout(t); }, [filters, sortBy, searchQuery]);

  const filtered = useMemo(() => {
    let result = PRODUCTS.filter(p => {
      if(filters.categories.length>0&&!filters.categories.includes(p.category)) return false;
      if(p.price>filters.maxPrice) return false;
      if(filters.minRating>0&&p.rating<filters.minRating) return false;
      if(filters.inStockOnly&&!p.inStock) return false;
      if(searchQuery.trim()){const q=searchQuery.trim().toLowerCase();if(!p.name.toLowerCase().includes(q)&&!p.category.toLowerCase().includes(q)) return false;}
      return true;
    });
    switch(sortBy){
      case 'price-asc': result.sort((a,b)=>a.price-b.price); break;
      case 'price-desc': result.sort((a,b)=>b.price-a.price); break;
      case 'rating-desc': result.sort((a,b)=>b.rating-a.rating); break;
      case 'newest': result.sort((a,b)=>a.addedDaysAgo-b.addedDaysAgo); break;
    }
    return result;
  }, [filters, sortBy, searchQuery]);

  const productCounts = useMemo(() => { const c={}; PRODUCTS.forEach(p=>{c[p.category]=(c[p.category]||0)+1;}); return c; }, []);
  const activeFilterCount = filters.categories.length + (filters.minRating>0?1:0) + (filters.inStockOnly?1:0) + (filters.maxPrice<maxPrice?1:0);

  return (
    <div style={{ maxWidth:1320, margin:'0 auto', padding:'32px 24px 90px' }}>
      <div style={{ marginBottom:28 }}>
        <h1 style={{ fontFamily:'Fraunces,serif', fontSize:38, fontWeight:700, color:'#1C1B19', margin:'0 0 8px' }}>Shop all products</h1>
        <p style={{ fontFamily:'Inter,sans-serif', fontSize:14.5, color:'#8C8579', margin:0 }}>
          {loading ? 'Searching…' : `${filtered.length} ${filtered.length===1?'result':'results'}`}
          {searchQuery&&!loading&&<> for "<strong style={{color:'#1C1B19'}}>{searchQuery}</strong>"</>}
        </p>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'260px 1fr', gap:36 }} className="products-layout">
        <aside className="filter-sidebar"><FilterPanel filters={filters} setFilters={setFilters} productCounts={productCounts} maxPrice={maxPrice} /></aside>
        <div>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:22, gap:12, flexWrap:'wrap' }}>
            <button className="mobile-filter-btn" onClick={() => setMobileFiltersOpen(true)} style={{ display:'none', alignItems:'center', gap:8, padding:'10px 16px', borderRadius:8, border:'1.5px solid #EFE9DD', background:'#FFFFFF', cursor:'pointer', fontFamily:'Inter,sans-serif', fontSize:13.5, fontWeight:600, color:'#1C1B19' }}>
              ⊞ Filters {activeFilterCount>0&&`(${activeFilterCount})`}
            </button>
            <div />
            <div style={{ position:'relative' }}>
              <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{ appearance:'none', border:'1.5px solid #EFE9DD', borderRadius:8, padding:'10px 36px 10px 14px', fontFamily:'Inter,sans-serif', fontSize:13.5, fontWeight:600, color:'#1C1B19', background:'#FFFFFF', cursor:'pointer' }}>
                {SORT_OPTIONS.map(opt => <option key={opt.id} value={opt.id}>{opt.label}</option>)}
              </select>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B5D4F" strokeWidth="2" style={{ position:'absolute', right:12, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }}><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
          {activeFilterCount>0 && (
            <div style={{ display:'flex', gap:8, marginBottom:18, flexWrap:'wrap' }}>
              {filters.categories.map(c => <FilterChip key={c} label={CATEGORIES.find(cat=>cat.id===c)?.name} onRemove={() => setFilters(f=>({...f,categories:f.categories.filter(x=>x!==c)}))} />)}
              {filters.minRating>0 && <FilterChip label={`${filters.minRating}+ stars`} onRemove={() => setFilters(f=>({...f,minRating:0}))} />}
              {filters.inStockOnly && <FilterChip label="In stock" onRemove={() => setFilters(f=>({...f,inStockOnly:false}))} />}
              {filters.maxPrice<maxPrice && <FilterChip label={`Under $${filters.maxPrice}`} onRemove={() => setFilters(f=>({...f,maxPrice}))} />}
            </div>
          )}
          {loading ? (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:20 }} className="product-grid-3">
              {Array.from({length:6}).map((_,i)=><ProductCardSkeleton key={i}/>)}
            </div>
          ) : filtered.length===0 ? (
            <EmptyState icon={({size,color}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>} title="No products found" message="Try removing a filter or searching for something else." action={<Button variant="secondary" onClick={() => { setFilters({categories:[],maxPrice,minRating:0,inStockOnly:false}); setSearchQuery(''); }}>Clear filters</Button>} />
          ) : (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:20 }} className="product-grid-3">
              {filtered.map(p => <ProductCard key={p.id} product={p} onNavigate={onNavigate} />)}
            </div>
          )}
        </div>
      </div>
      {mobileFiltersOpen && (
        <div style={{ position:'fixed', inset:0, zIndex:55, display:'flex' }}>
          <div onClick={() => setMobileFiltersOpen(false)} style={{ position:'absolute', inset:0, background:'rgba(28,27,25,0.35)' }} />
          <div style={{ position:'relative', marginLeft:'auto', width:'min(340px,88vw)', height:'100%', background:'#FAF7F2', padding:24, overflowY:'auto' }}>
            <button onClick={() => setMobileFiltersOpen(false)} style={{ position:'absolute', top:20, right:20, background:'none', border:'none', cursor:'pointer' }}>✕</button>
            <div style={{ marginTop:32 }}><FilterPanel filters={filters} setFilters={setFilters} productCounts={productCounts} maxPrice={maxPrice} /></div>
            <Button variant="primary" full onClick={() => setMobileFiltersOpen(false)} style={{ marginTop:12 }}>Show {filtered.length} results</Button>
          </div>
        </div>
      )}
      <style>{`@media(max-width:920px){.products-layout{grid-template-columns:1fr!important;}.filter-sidebar{display:none!important;}.mobile-filter-btn{display:flex!important;}.product-grid-3{grid-template-columns:repeat(2,1fr)!important;}}@media(max-width:560px){.product-grid-3{grid-template-columns:1fr!important;}}`}</style>
    </div>
  );
}

                  <div style={{ display:'flex', gap:10 }}>
                    {product.colors.map(c => (
                      <button key={c} onClick={() => setSelectedColor(c)} aria-label={c} style={{ width:36, height:36, borderRadius:'50%', border:selectedColor===c?'2px solid #1C1B19':'2px solid transparent', padding:2, cursor:'pointer', background:'transparent', outline:selectedColor===c?'1px solid #1C1B19':'none', outlineOffset:2 }}>
                        <div style={{ width:'100%', height:'100%', borderRadius:'50%', background:COLOR_HEX[c]||'#CCC', border:'1px solid rgba(0,0,0,0.08)' }} />
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {product.sizes && (
                <div style={{ marginBottom:22 }}>
                  <div style={{ fontFamily:'Inter,sans-serif', fontSize:13.5, fontWeight:600, color:'#1C1B19', marginBottom:10 }}>Size</div>
                  <div style={{ display:'flex', gap:10 }}>
                    {product.sizes.map(s => (
                      <button key={s} onClick={() => setSelectedSize(s)} style={{ width:44, height:40, borderRadius:8, fontFamily:'Inter,sans-serif', fontSize:13.5, fontWeight:600, border:`1.5px solid ${selectedSize===s?'#1C1B19':'#EFE9DD'}`, background:selectedSize===s?'#1C1B19':'#FFFFFF', color:selectedSize===s?'#FAF7F2':'#1C1B19', cursor:'pointer', transition:'all 0.15s ease' }}>{s}</button>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ display:'flex', gap:12, alignItems:'stretch', marginBottom:18 }}>
                <div style={{ display:'flex', alignItems:'center', border:'1.5px solid #EFE9DD', borderRadius:8 }}>
                  <button onClick={() => setQuantity(q=>Math.max(1,q-1))} style={{ width:44, height:48, border:'none', background:'none', cursor:'pointer', fontSize:18 }}>−</button>
                  <span style={{ width:40, textAlign:'center', fontFamily:'Inter,sans-serif', fontSize:15, fontWeight:600 }}>{quantity}</span>
                  <button onClick={() => setQuantity(q=>q+1)} style={{ width:44, height:48, border:'none', background:'none', cursor:'pointer', fontSize:18 }}>+</button>
                </div>
                <Button variant="accent" size="lg" style={{ flex:1, height:48 }} disabled={!product.inStock} onClick={() => addItem(product, {color:selectedColor, size:selectedSize, quantity})}>
                  🛍 {product.inStock ? 'Add to cart' : 'Out of stock'}
                </Button>
              </div>

              {!product.inStock && <div style={{ display:'flex', alignItems:'center', gap:8, fontFamily:'Inter,sans-serif', fontSize:13, color:'#B5562C', marginBottom:18 }}>⚠ This item is currently out of stock</div>}
              <div style={{ display:'flex', alignItems:'center', gap:8, fontFamily:'Inter,sans-serif', fontSize:13, color:'#6B5D4F', paddingTop:18, borderTop:'1px solid #EFE9DD' }}>
                🚚 Free shipping on orders over ${FREE_SHIPPING_THRESHOLD}
              </div>
            </>
          )}
        </div>
      </div>

      {!loading && (
        <div style={{ marginTop:60 }}>
          <div style={{ display:'flex', gap:28, borderBottom:'1px solid #EFE9DD', marginBottom:24 }}>
            {[{id:'description',label:'Description'},{id:'details',label:'Materials & care'},{id:'reviews',label:`Reviews (${product.reviewCount})`}].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ background:'none', border:'none', cursor:'pointer', padding:'0 0 14px', fontFamily:'Inter,sans-serif', fontSize:14.5, fontWeight:600, color:activeTab===tab.id?'#1C1B19':'#A39B8C', borderBottom:activeTab===tab.id?'2px solid #B5562C':'2px solid transparent' }}>{tab.label}</button>
            ))}
          </div>
          <div style={{ maxWidth:720 }}>
            {activeTab==='description' && <p style={{ fontFamily:'Inter,sans-serif', fontSize:15, color:'#6B5D4F', lineHeight:1.8, margin:0 }}>{product.description} Every piece is inspected before it leaves our workshop, and packaging is designed to be reused.</p>}
            {activeTab==='details' && <ul style={{ fontFamily:'Inter,sans-serif', fontSize:15, color:'#6B5D4F', lineHeight:1.9, margin:0, paddingLeft:20 }}>{product.details.map((d,i)=><li key={i}>{d}</li>)}</ul>}
            {activeTab==='reviews' && (
              <div>
                <div style={{ display:'flex', alignItems:'center', gap:16, marginBottom:24 }}>
                  <div style={{ fontFamily:'Fraunces,serif', fontSize:48, fontWeight:700, color:'#1C1B19' }}>{product.rating.toFixed(1)}</div>
                  <div>
                    <StarRating rating={product.rating} showNumber={false} size={18} />
                    <div style={{ fontFamily:'Inter,sans-serif', fontSize:13, color:'#A39B8C', marginTop:4 }}>Based on {product.reviewCount} reviews</div>
                  </div>
                </div>
                {[{name:'Jordan M.',rating:5,text:'Exactly as pictured and incredibly comfortable. Assembly took about 15 minutes with two people.'},{name:'Priya K.',rating:4,text:'Lovely quality and finish. Shipping took a bit longer than expected but well worth the wait.'}].map((r,i) => (
                  <div key={i} style={{ borderTop:'1px solid #EFE9DD', padding:'18px 0' }}>
                    <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                      <span style={{ fontFamily:'Inter,sans-serif', fontSize:14, fontWeight:600, color:'#1C1B19' }}>{r.name}</span>
                      <StarRating rating={r.rating} showNumber={false} size={13} />
                    </div>
                    <p style={{ fontFamily:'Inter,sans-serif', fontSize:14, color:'#6B5D4F', lineHeight:1.7, margin:0 }}>{r.text}</p>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {similar.length>0 && !loading && (
        <div style={{ marginTop:72 }}>
          <h2 style={{ fontFamily:'Fraunces,serif', fontSize:28, fontWeight:700, color:'#1C1B19', margin:'0 0 24px' }}>You may also like</h2>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:20 }} className="product-grid-4">
            {similar.map(p => <ProductCard key={p.id} product={p} onNavigate={onNavigate} />)}
          </div>
        </div>
      )}
      <style>{`@media(max-width:860px){.pdp-grid{grid-template-columns:1fr!important;gap:32px!important;}}@media(max-width:1000px){.product-grid-4{grid-template-columns:repeat(2,1fr)!important;}}@media(max-width:560px){.product-grid-4{grid-template-columns:1fr!important;}}`}</style>
    </div>
  );
}

/* ============================================================
   CHECKOUT PAGE
   ============================================================ */
function CheckoutPage({ onNavigate }) {
  const { items, subtotal, clearCart } = useCart();
  const shipping = items.length===0 ? 0 : (subtotal>=FREE_SHIPPING_THRESHOLD?0:SHIPPING_FLAT);
  const tax = subtotal * TAX_RATE;
  const total = subtotal + shipping + tax;
  const [form, setForm] = useState({ firstName:'', lastName:'', email:'', address:'', apt:'', city:'', state:'', zip:'', phone:'', paymentMethod:'card', cardNumber:'', cardExpiry:'', cardCvc:'' });
  const [errors, setErrors] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [success, setSuccess] = useState(false);

  if(items.length===0 && !success) return (
    <div style={{ maxWidth:1320, margin:'0 auto', padding:'60px 24px' }}>
      <EmptyState icon={({size,color}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>} title="Your cart is empty" message="Add some items before checking out." action={<Button variant="primary" onClick={() => onNavigate('products')}>Browse products</Button>} />
    </div>
  );

  if(success) return (
    <div style={{ maxWidth:560, margin:'80px auto', padding:'0 24px', textAlign:'center' }}>
      <div style={{ width:72, height:72, borderRadius:'50%', background:'#3D4A3D', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 24px' }}>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#FFF" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1 style={{ fontFamily:'Fraunces,serif', fontSize:38, fontWeight:700, color:'#1C1B19', margin:'0 0 14px' }}>Order placed!</h1>
      <p style={{ fontFamily:'Inter,sans-serif', fontSize:15, color:'#6B5D4F', lineHeight:1.7, marginBottom:32 }}>Thank you for your order. You'll receive a confirmation email shortly with tracking information.</p>
      <Button variant="accent" size="lg" onClick={() => onNavigate('home')}>Back to home</Button>
    </div>
  );

  const set = key => e => setForm(f => ({...f, [key]: e.target.value}));

  const validate = () => {
    const e = {};
    if(!form.firstName.trim()) e.firstName = 'Required';
    if(!form.lastName.trim()) e.lastName = 'Required';
    if(!form.email.trim()||!/\S+@\S+\.\S+/.test(form.email)) e.email = 'Valid email required';
    if(!form.address.trim()) e.address = 'Required';
    if(!form.city.trim()) e.city = 'Required';
    if(!form.zip.trim()) e.zip = 'Required';
    if(form.paymentMethod==='card'){
      if(!form.cardNumber.trim()) e.cardNumber='Required';
      if(!form.cardExpiry.trim()) e.cardExpiry='Required';
      if(!form.cardCvc.trim()) e.cardCvc='Required';
    }
    return e;
  };

  const handleSubmit = e => {
    e.preventDefault();
    const errs = validate();
    if(Object.keys(errs).length > 0){ setErrors(errs); return; }
    setSubmitting(true);
    setTimeout(() => { clearCart(); setSubmitting(false); setSuccess(true); }, 1500);
  };

  const Field = ({ label, value, onChange, placeholder, required, error, type='text' }) => (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:'block', fontFamily:'Inter,sans-serif', fontSize:13, fontWeight:600, color:'#1C1B19', marginBottom:6 }}>{label}{required&&<span style={{color:'#B5562C'}}> *</span>}</label>
      <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={{ width:'100%', padding:'11px 14px', border:`1.5px solid ${error?'#B5562C':'#E4DCC9'}`, borderRadius:8, fontFamily:'Inter,sans-serif', fontSize:14, color:'#1C1B19', background:'#FFFFFF', outline:'none' }} />
      {error && <div style={{ fontFamily:'Inter,sans-serif', fontSize:12, color:'#B5562C', marginTop:4 }}>{error}</div>}
    </div>
  );

  return (
    <div style={{ maxWidth:1320, margin:'0 auto', padding:'32px 24px 90px' }}>
      <button onClick={() => onNavigate('products')} style={{ display:'flex', alignItems:'center', gap:8, background:'none', border:'none', cursor:'pointer', fontFamily:'Inter,sans-serif', fontSize:14, fontWeight:600, color:'#6B5D4F', marginBottom:32 }}>← Continue shopping</button>
      <h1 style={{ fontFamily:'Fraunces,serif', fontSize:38, fontWeight:700, color:'#1C1B19', margin:'0 0 36px' }}>Checkout</h1>
      <form onSubmit={handleSubmit}>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 400px', gap:48 }} className="checkout-grid">
          <div>
            <div style={{ background:'#FFFFFF', border:'1px solid #EFE9DD', borderRadius:12, padding:28, marginBottom:24 }}>
              <h3 style={{ fontFamily:'Fraunces,serif', fontSize:20, fontWeight:700, color:'#1C1B19', margin:'0 0 20px' }}>Shipping information</h3>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
                <Field label="First name" value={form.firstName} onChange={set('firstName')} required error={errors.firstName} />
                <Field label="Last name" value={form.lastName} onChange={set('lastName')} required error={errors.lastName} />
              </div>
              <Field label="Email address" value={form.email} onChange={set('email')} type="email" placeholder="you@example.com" required error={errors.email} />
              <Field label="Street address" value={form.address} onChange={set('address')} required error={errors.address} />
              <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:12 }}>
                <Field label="City" value={form.city} onChange={set('city')} required error={errors.city} />
                <Field label="State" value={form.state} onChange={set('state')} />
                <Field label="ZIP code" value={form.zip} onChange={set('zip')} required error={errors.zip} />
              </div>
            </div>
            <div style={{ background:'#FFFFFF', border:'1px solid #EFE9DD', borderRadius:12, padding:28 }}>
              <h3 style={{ fontFamily:'Fraunces,serif', fontSize:20, fontWeight:700, color:'#1C1B19', margin:'0 0 20px' }}>Payment method</h3>
              <div style={{ display:'flex', gap:12, marginBottom:20 }}>
                {[['card','💳 Credit card'],['paypal','🅿 PayPal']].map(([val,label]) => (
                  <label key={val} style={{ display:'flex', alignItems:'center', gap:10, padding:'14px 20px', border:`2px solid ${form.paymentMethod===val?'#1C1B19':'#EFE9DD'}`, borderRadius:10, cursor:'pointer', flex:1, fontFamily:'Inter,sans-serif', fontSize:14, fontWeight:600, color:'#1C1B19', background:form.paymentMethod===val?'#F5F0E6':'#FFF' }}>
                    <input type="radio" value={val} checked={form.paymentMethod===val} onChange={set('paymentMethod')} style={{ display:'none' }} />
                    {label}
                  </label>
                ))}
              </div>
              {form.paymentMethod==='card' ? (
                <>
                  <Field label="Card number" value={form.cardNumber} onChange={set('cardNumber')} placeholder="1234 5678 9012 3456" required error={errors.cardNumber} />
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
                    <Field label="Expiry date" value={form.cardExpiry} onChange={set('cardExpiry')} placeholder="MM / YY" required error={errors.cardExpiry} />
                    <Field label="CVC" value={form.cardCvc} onChange={set('cardCvc')} placeholder="123" required error={errors.cardCvc} />
                  </div>
                </>
              ) : (
                <p style={{ fontFamily:'Inter,sans-serif', fontSize:14, color:'#6B5D4F' }}>You'll be redirected to PayPal to complete your purchase.</p>
              )}
            </div>
          </div>

          <div>
            <div style={{ background:'#FFFFFF', border:'1px solid #EFE9DD', borderRadius:12, padding:24, position:'sticky', top:96 }}>
              <h3 style={{ fontFamily:'Fraunces,serif', fontSize:20, fontWeight:700, color:'#1C1B19', margin:'0 0 18px' }}>Order summary</h3>
              <div style={{ maxHeight:280, overflowY:'auto', marginBottom:16 }}>
                {items.map(item => (
                  <div key={item.lineId} style={{ display:'flex', gap:12, marginBottom:14 }}>
                    <div style={{ position:'relative', flexShrink:0, width:56, height:56, borderRadius:6, overflow:'hidden' }}>
                      <ProductImg src={item.image} alt={item.name} />
                      <span style={{ position:'absolute', top:-6, right:-6, width:20, height:20, borderRadius:'50%', background:'#1C1B19', color:'#FAF7F2', fontSize:11, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Inter,sans-serif' }}>{item.quantity}</span>
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontFamily:'Fraunces,serif', fontSize:14, fontWeight:600, color:'#1C1B19', lineHeight:1.3 }}>{item.name}</div>
                      <div style={{ fontFamily:'Inter,sans-serif', fontSize:12, color:'#A39B8C' }}>{item.color}{item.color&&item.size&&' · '}{item.size&&`Size ${item.size}`}</div>
                    </div>
                    <div style={{ fontFamily:'Inter,sans-serif', fontSize:13.5, fontWeight:600, color:'#1C1B19' }}>${(item.price*item.quantity).toFixed(2)}</div>
                  </div>
                ))}
              </div>
              <div style={{ borderTop:'1px solid #EFE9DD', paddingTop:14 }}>
                {[['Subtotal', subtotal],['Shipping', shipping],['Estimated tax', tax]].map(([label,val]) => (
                  <div key={label} style={{ display:'flex', justifyContent:'space-between', padding:'5px 0', fontFamily:'Inter,sans-serif', fontSize:13.5, color:'#6B5D4F' }}>
                    <span>{label}</span>
                    <span style={{ color: label==='Shipping'&&val===0?'#3D4A3D':'#1C1B19', fontWeight: label==='Shipping'&&val===0?600:500 }}>{label==='Shipping'&&val===0?'Free':`$${val.toFixed(2)}`}</span>
                  </div>
                ))}
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginTop:12, paddingTop:12, borderTop:'1px solid #EFE9DD' }}>
                  <span style={{ fontFamily:'Inter,sans-serif', fontSize:15, fontWeight:600, color:'#1C1B19' }}>Total</span>
                  <span style={{ fontFamily:'Fraunces,serif', fontSize:26, fontWeight:700, color:'#1C1B19' }}>${total.toFixed(2)}</span>
                </div>
              </div>
              <Button type="submit" variant="accent" full size="lg" disabled={submitting} style={{ marginTop:20 }}>
                {submitting ? 'Placing order…' : `Place order — $${total.toFixed(2)}`}
              </Button>
              <p style={{ fontFamily:'Inter,sans-serif', fontSize:11.5, color:'#A39B8C', textAlign:'center', marginTop:12, lineHeight:1.6 }}>By placing your order you agree to our Terms of Service.</p>
            </div>
          </div>
        </div>
      </form>
      <style>{`@media(max-width:900px){.checkout-grid{grid-template-columns:1fr!important;gap:32px!important;}}`}</style>
    </div>
  );
}

/* ============================================================
   FOOTER
   ============================================================ */
function Footer({ onNavigate }) {
  return (
    <footer style={{ background:'#1C1B19', color:'#C8C2B6', marginTop:'auto' }}>
      <div style={{ maxWidth:1320, margin:'0 auto', padding:'56px 24px 28px', display:'grid', gridTemplateColumns:'1.4fr 1fr 1fr 1fr', gap:40 }} className="footer-grid">
        <div>
          <div style={{ fontFamily:'Fraunces,serif', fontSize:24, fontWeight:700, color:'#FAF7F2', marginBottom:14 }}>Atelier<span style={{ color:'#D9A05B' }}>Nova</span></div>
          <p style={{ fontFamily:'Inter,sans-serif', fontSize:13.5, lineHeight:1.8, maxWidth:280, color:'#9C958A' }}>Thoughtfully designed furniture and decor, made to last and built around how you actually live.</p>
        </div>
        {[['Shop',['New arrivals','Best sellers','Sale','All products']],['Support',['Shipping & returns','Track an order','FAQs','Contact us']],['Company',['Our story','Sustainability','Careers','Press']]].map(([title,links]) => (
          <div key={title}>
            <div style={{ fontFamily:'Inter,sans-serif', fontSize:13, fontWeight:700, color:'#FAF7F2', marginBottom:16, textTransform:'uppercase', letterSpacing:'0.06em' }}>{title}</div>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {links.map(l => <button key={l} onClick={() => onNavigate('products')} style={{ background:'none', border:'none', cursor:'pointer', textAlign:'left', fontFamily:'Inter,sans-serif', fontSize:13.5, color:'#9C958A', padding:0 }}>{l}</button>)}
            </div>
          </div>
        ))}
      </div>
      <div style={{ borderTop:'1px solid #34322F', padding:'20px 24px', maxWidth:1320, margin:'0 auto', display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap:12 }}>
        <span style={{ fontFamily:'Inter,sans-serif', fontSize:12.5, color:'#7A746A' }}>© 2026 AtelierNova. All rights reserved.</span>
        <span style={{ fontFamily:'Inter,sans-serif', fontSize:12.5, color:'#7A746A' }}>Portfolio demo — all data is simulated</span>
      </div>
      <style>{`@media(max-width:800px){.footer-grid{grid-template-columns:1fr 1fr!important;}}`}</style>
    </footer>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App() {
  const [page, setPage] = useState('home');
  const [productId, setProductId] = useState(null);
  const [cartOpen, setCartOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [selectedCategory, setSelectedCategory] = useState(null);

  const handleNavigate = (target, id) => {
    setPage(target);
    if(target==='product') setProductId(id);
    window.scrollTo({ top:0, behavior:'instant' });
  };

  return (
    <CartProvider>
      <div style={{ fontFamily:'Inter,sans-serif', background:'#FAF7F2', minHeight:'100vh', display:'flex', flexDirection:'column', color:'#1C1B19' }}>
        <Header onNavigate={handleNavigate} currentPage={page} searchQuery={searchQuery} setSearchQuery={setSearchQuery} onOpenCart={() => setCartOpen(true)} />
        <main style={{ flex:1 }}>
          {page==='home' && <HomePage onNavigate={handleNavigate} setSelectedCategory={setSelectedCategory} />}
          {page==='products' && <ProductsPage onNavigate={handleNavigate} searchQuery={searchQuery} setSearchQuery={setSearchQuery} selectedCategory={selectedCategory} setSelectedCategory={setSelectedCategory} />}
          {page==='product' && <ProductDetailPage productId={productId} onNavigate={handleNavigate} />}
          {page==='checkout' && <CheckoutPage onNavigate={handleNavigate} />}
        </main>
        <Footer onNavigate={handleNavigate} />
        <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)} onNavigate={handleNavigate} />
        <ToastWrapper />
      </div>
    </CartProvider>
  );
}

function ToastWrapper() {
  const { toast } = useCart();
  return <Toast toast={toast} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
